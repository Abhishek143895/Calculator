<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Main.css">
</head>
<body>
    <div id="calculator">
        <div id="div-1"></div>
        <div id="div-2">
            <div class="calcy-in">
                <div class="calcy-btn"><button >AC</button></div>
                <div class="calcy-btn"><button>+</button></div>
                <div class="calcy-btn"><button>-</button></div>
                <div class="calcy-btn"><button>÷</button></div>
            </div>
            <div class="calcy-in">
                <div class="calcy-btn"><button>7</button></div>
                <div class="calcy-btn"><button>8</button></div>
                <div class="calcy-btn"><button>9</button></div>
                <div class="calcy-btn"><button>x</button></div>
            </div>
            <div class="calcy-in">
                <div class="calcy-btn"><button>4</button></div>
                <div class="calcy-btn"><button>5</button></div>
                <div class="calcy-btn"><button>6</button></div>
                <div class="calcy-btn"><button>%</button></div>
            </div>
            <div class="calcy-in">
                <div class="calcy-btn"><button>1</button></div>
                <div class="calcy-btn"><button>2</button></div>
                <div class="calcy-btn"><button>3</button></div>
                <div class="calcy-btn"><button>+</button></div>
            </div>
            <div class="calcy-in">
                <div class="calcy-last"><button>0</button></div>
                <div class="calcy-last"><button style="background-color:rgb(33, 106, 223);">=</button></div>
                <div class="calcy-last"><button>.</button></div>
            </div>
        </div>
    </div>





    <script src="script.js"></script>
</body>
</html>
